<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatType - keyboard Mania</title>
    <audio id="game-audio" src="" preload="auto"></audio>
    <link rel="stylesheet" href="./style/game-page-style.css">
</head>

<body>
    <div id="start-message">
        Press SPACE to Start
    </div>

    <header>
        <div>
            <label>Score</label>
            <span id="score">0</span>
        </div>

        <div>
            <label>Combo</label>
            <span id="combo">0</span>
        </div>

        <div>
            <label>Accuracy</label>
            <span id="accuracy">0.00%</span>
        </div>
    </header>

    <main>
        <div class="playing-field" id="lanes">
            <div id="lane_0" class="lane">
                <div class="hitlane"></div>
                <div class="key-indicator">A</div>
            </div>
            <div id="lane_1" class="lane">
                <div class="hitlane"></div>
                <div class="key-indicator">S</div>
            </div>
            <div id="lane_2" class="lane">
                <div class="hitlane"></div>
                <div class="key-indicator">D</div>
            </div>
            <div id="lane_3" class="lane">
                <div class="hitlane"></div>
                <div class="key-indicator">F</div>
            </div>
            <div id="lane_4" class="lane">
                <div class="hitlane"></div>
                <div class="key-indicator">SPACE</div>
            </div>
            <div id="lane_5" class="lane">
                <div class="hitlane"></div>
                <div class="key-indicator">J</div>
            </div>
            <div id="lane_6" class="lane">
                <div class="hitlane"></div>
                <div class="key-indicator">K</div>
            </div>
            <div id="lane_7" class="lane">
                <div class="hitlane"></div>
                <div class="key-indicator">L</div>
            </div>
            <div id="lane_8" class="lane">
                <div class="hitlane"></div>
                <div class="key-indicator">;</div>
            </div>
        </div>

        <div id="result-overlay">
            <div class="result">
                <div id="grade"><h1>SS</h1></div>

                <div class="result-stats">
                    <div class="stat-row">Score: <span id="final-score">0</span></div>
                    <div class="stat-row">Max Combo: <span id="final-combo">0</span></div>
                    <div class="stat-row">Accuracy: <span id="final-accuracy">100.00%</span></div>
                </div>
            </div>

            <div class="result-breakdown">
                <div class="breakdown perfect">Perfect: <span id="count-perfect">0</span></div>
                <div class="breakdown great">Great: <span id="count-great">0</span></div>
                <div class="breakdown good">Good: <span id="count-good">0</span></div>
                <div class="breakdown bad">Bad: <span id="count-bad">0</span></div>
                <div class="breakdown miss">Miss: <span id="count-miss">0</span></div>
            </div>

            <div id="btns">
                <button class="btn" id="btn-restart">Play Again</button>
                <button class="btn" id="btn-menu">Back to Menu</button>
            </div>
        </div>
    </main>
    <script src="./script/game_page.js"></script>
</body>

</html>
