<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatType - Admin</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav id="admin-nav">
            <div class="admin-nav-buttons">
                <button class="btn" id="btn-dashboard">Dashboard</button>
                <button class="btn" id="btn-beatmaps">Manage Beatmaps</button>
                <button class="btn" id="btn-add">Add Beatmap</button>
            </div>
            <a href="index.html" class="btn">← Back to User Panel</a>
        </nav>
    </header>

    <main>
        <section id="admin-stats" class="admin-section" style="display:block;">
            <h2>Dashboard</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3 id="stat-total">0</h3>
                    <p>Total Beatmaps</p>
                </div>
                <div class="stat-card">
                    <h3 id="stat-avg-diff">0</h3>
                    <p>Avg Difficulties / Song</p>
                </div>
                <div class="stat-card">
                    <h3 id="stat-most-common">N/A</h3>
                    <p>Most Common Difficulty</p>
                </div>
            </div>
        </section>

        <section id="admin-beatmaps" class="admin-section" style="display:none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2>Manage Beatmaps</h2>
                <button id="export-csv-btn" class="btn admin-export-btn">Export CSV</button>
            </div>
            <table id="beatmap-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Difficulties</th>
                        <th>File Path</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="beatmap-table-body"></tbody>
            </table>
        </section>

        <section id="admin-form-section" class="admin-section" style="display:none;">
            <h2 id="form-title">Add New Beatmap</h2>
            <form id="beatmap-form" novalidate>
                <label for="beatmap-title">Title</label>
                <input type="text" id="beatmap-title">

                <label for="beatmap-difficulties">Difficulties (comma‑separated)</label>
                <input type="text" id="beatmap-difficulties" placeholder="1,2,3">

                <label for="beatmap-filepath">File Path</label>
                <input type="text" id="beatmap-filepath">

                <div class="form-buttons">
                    <button type="submit" id="save-btn">Add Beatmap</button>
                    <button type="button" id="cancel-edit-btn" style="display:none;">Cancel</button>
                </div>
                <span class="error-message" id="form-error"></span>
            </form>
        </section>
    </main>
    <script src="admin.js"></script>
</body>

</html>
