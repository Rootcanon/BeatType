<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatType - Keyboard Mania</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav id="main-nav">
            <button id="nav-main">Main</button>
            <button id="nav-beatmaps">Beatmaps</button>
            <button id="nav-performance">Performance</button>
        </nav>
    </header>

    <main>
        <section class="main-view">
            <div id="user-info">
                <div id="stats">
                    <input type="text" id="username-input" placeholder="Guest" autocomplete="off" maxlength="24">
                    <span id="user-score">0</span>
                    <span id="user-accuracy">0.00%</span>
                </div>
                <div class="recent-plays">
                    <h3>Recent Plays</h3>
                    <hr>
                    <div id="recent-plays-cards"></div>
                </div>
            </div>

            <div id="beatmap-section">
                <h2>Select a Beatmap</h2>
                <div id="filter">
                    <div class="filter-group">
                        <label for="difficulty-filter">Difficulty:</label>
                        <select id="difficulty-filter">
                            <option value="all">All</option>
                            <option value="1">★☆☆☆☆</option>
                            <option value="2">★★☆☆☆</option>
                            <option value="3">★★★☆☆</option>
                            <option value="4">★★★★☆</option>
                            <option value="5">★★★★★</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="sort-filter">Sort:</label>
                        <select id="sort-filter">
                            <option value="none">Default</option>
                            <option value="name-asc">Name A-Z</option>
                            <option value="name-desc">Name Z-A</option>
                        </select>
                    </div>
                </div>
                <hr>
                <div id="beatmap-cards"></div>
            </div>
        </section>

        <section class="game-view" hidden>
            <!-- Game HUD -->
            <div id="game-hud">
                <div>
                    <label>Score</label>
                    <span id="score">0</span>
                </div>
                <div>
                    <label>Combo</label>
                    <span id="combo">0</span>
                </div>
                <div>
                    <label>Accuracy</label>
                    <span id="accuracy">100.00%</span>
                </div>
            </div>

            <div id="start-message"> Press SPACE to Start </div>

            <div class="playing-field" id="lanes">
                <div id="lane_8" class="lane">
                    <div class="hitlane"></div>
                    <div class="key-indicator">A</div>
                </div>
                <div id="lane_6" class="lane">
                    <div class="hitlane"></div>
                    <div class="key-indicator">S</div>
                </div>
                <div id="lane_2" class="lane">
                    <div class="hitlane"></div>
                    <div class="key-indicator">D</div>
                </div>
                <div id="lane_0" class="lane">
                    <div class="hitlane"></div>
                    <div class="key-indicator">F</div>
                </div>
                <div id="lane_4" class="lane">
                    <div class="hitlane"></div>
                    <div class="key-indicator">SPACE</div>
                </div>
                <div id="lane_1" class="lane">
                    <div class="hitlane"></div>
                    <div class="key-indicator">J</div>
                </div>
                <div id="lane_3" class="lane">
                    <div class="hitlane"></div>
                    <div class="key-indicator">K</div>
                </div>
                <div id="lane_5" class="lane">
                    <div class="hitlane"></div>
                    <div class="key-indicator">L</div>
                </div>
                <div id="lane_7" class="lane">
                    <div class="hitlane"></div>
                    <div class="key-indicator">;</div>
                </div>
            </div>

            <div id="result-overlay" hidden>
                <div class="result">
                    <div id="grade">
                        <h1>SS</h1>
                    </div>

                    <div class="result-stats">
                        <div class="stat-row">Score: <span id="final-score">0</span></div>
                        <div class="stat-row">Max Combo: <span id="final-combo">0</span></div>
                        <div class="stat-row">Accuracy: <span id="final-accuracy">100.00%</span></div>
                    </div>
                </div>

                <div class="result-breakdown">
                    <div class="breakdown perfect">Perfect: <span id="count-perfect">0</span></div>
                    <div class="breakdown great">Great: <span id="count-great">0</span></div>
                    <div class="breakdown good">Good: <span id="count-good">0</span></div>
                    <div class="breakdown bad">Bad: <span id="count-bad">0</span></div>
                    <div class="breakdown miss">Miss: <span id="count-miss">0</span></div>
                </div>

                <div id="btns">
                    <button class="btn" id="btn-restart">Play Again</button>
                    <button class="btn" id="btn-menu">Back to Menu</button>
                    <button class="btn" id="btn-submit-score">Submit Score</button>
                    <span id="submit-success"></span>
                </div>

                <div id="score-submission" hidden onsubmit="return false">
                    <h3>Submit Your Score</h3>
                    <label for="player-name">Your Name</label>
                    <input type="text" id="player-name" minlength="2" required>

                    <input type="hidden" id="submitted-score">
                    <input type="hidden" id="submitted-combo">
                    <input type="hidden" id="submitted-accuracy">
                    <input type="hidden" id="submitted-difficulty">
                    <input type="hidden" id="submitted-song">
                    <input type="hidden" id="submitted-date">

                    <span class="error-message" id="name-error"></span>
                    <div class="form-buttons">
                        <button type="button" id="submit-name-btn">Submit</button>
                        <button type="button" id="cancel-submit-btn">Cancel</button>
                    </div>
                    <span class="error-message" id="submit-error"></span>
                </div>
            </div>
        </section>
    </main>

    <audio id="game-audio" src="" preload="auto"></audio>
    <script src="app.js"></script>
</body>

</html>
